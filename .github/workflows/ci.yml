name: CI

on:
  pull_request:
  push:

jobs:
  locale-parity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check en/ar locale parity
        run: npm run locale:check

      - name: Check Arabic locale integrity
        run: npm run locale:ar-integrity-check

      - name: Check Expert form i18n wiring
        run: npm run i18n:expert-form-check
