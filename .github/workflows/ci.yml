name: CI

on:
  pull_request:
  push:

jobs:
  locale-parity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check en/ar locale parity
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const enPath = path.join(process.cwd(), 'src/locales/en/translation.json');
          const arPath = path.join(process.cwd(), 'src/locales/ar/translation.json');

          const en = JSON.parse(fs.readFileSync(enPath, 'utf8'));
          const ar = JSON.parse(fs.readFileSync(arPath, 'utf8'));

          const isObject = (v) => v && typeof v === 'object' && !Array.isArray(v);

          function walkDiff(enNode, arNode, prefix = '', missingInAr = [], missingInEn = [], typeMismatches = []) {
            if (isObject(enNode) && isObject(arNode)) {
              const enKeys = Object.keys(enNode);
              const arKeys = Object.keys(arNode);

              for (const k of enKeys) {
                const p = prefix ? `${prefix}.${k}` : k;
                if (!(k in arNode)) {
                  missingInAr.push(p);
                } else {
                  walkDiff(enNode[k], arNode[k], p, missingInAr, missingInEn, typeMismatches);
                }
              }

              for (const k of arKeys) {
                const p = prefix ? `${prefix}.${k}` : k;
                if (!(k in enNode)) {
                  missingInEn.push(p);
                }
              }
              return { missingInAr, missingInEn, typeMismatches };
            }

            if (Array.isArray(enNode) && Array.isArray(arNode)) {
              const max = Math.max(enNode.length, arNode.length);
              for (let i = 0; i < max; i++) {
                const p = `${prefix}[${i}]`;
                if (i >= arNode.length) {
                  missingInAr.push(p);
                } else if (i >= enNode.length) {
                  missingInEn.push(p);
                } else {
                  walkDiff(enNode[i], arNode[i], p, missingInAr, missingInEn, typeMismatches);
                }
              }
              return { missingInAr, missingInEn, typeMismatches };
            }

            const enType = Array.isArray(enNode) ? 'array' : typeof enNode;
            const arType = Array.isArray(arNode) ? 'array' : typeof arNode;
            if (enType !== arType) {
              typeMismatches.push(`${prefix} (en:${enType} ar:${arType})`);
            }
            return { missingInAr, missingInEn, typeMismatches };
          }

          const result = walkDiff(en, ar);
          const hasErrors =
            result.missingInAr.length > 0 ||
            result.missingInEn.length > 0 ||
            result.typeMismatches.length > 0;

          if (result.missingInAr.length) {
            console.error('\nMissing in Arabic locale:');
            result.missingInAr.forEach((k) => console.error(`- ${k}`));
          }

          if (result.missingInEn.length) {
            console.error('\nMissing in English locale:');
            result.missingInEn.forEach((k) => console.error(`- ${k}`));
          }

          if (result.typeMismatches.length) {
            console.error('\nType mismatches between locales:');
            result.typeMismatches.forEach((k) => console.error(`- ${k}`));
          }

          if (hasErrors) {
            process.exit(1);
          }

          console.log('Locale parity check passed: en and ar are in sync.');
          EOF
